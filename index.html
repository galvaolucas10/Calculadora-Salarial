<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">
    <title>Finance App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
    <!-- MENU -->
    <div class="menu">
        <h2>💰 Finance App</h2>
        <button onclick="abrirHome()">
            Home
        </button>
        <button onclick="abrirCalculadora()">
            Calculadora
        </button>
    </div>
    <!-- HOME -->
    <div id="home" class="home">
        <div class="box">
            <h1>Bem-vindo 👋</h1>
            <p>
                Esse aplicativo calcula:
            </p>
            <ul>
                <li>INSS</li>
                <li>Imposto de Renda</li>
                <li>Dependentes</li>
                <li>Pensão</li>
                <li>Salário Líquido</li>
            </ul>
            <button onclick="abrirCalculadora()">
                Abrir Calculadora
            </button>
        </div>
    </div>
    <!-- CALCULADORA -->
    <div id="calculadora"
    class="calc">
        <!-- FORM -->
        <div class="box">
            <h1>Calculadora</h1>
            <input
            type="number"
            id="salario"
            placeholder="Salário Bruto">
            <select id="dependentes">
    <option value="0">0 Dependentes</option>
    <option value="1">1 Dependente</option>
    <option value="2">2 Dependentes</option>
    <option value="3">3 Dependentes</option>
    <option value="4">4 Dependentes</option>
    <option value="5">5 Dependentes</option>
    <option value="6">6 Dependentes</option>
    <option value="7">7 Dependentes</option>
    <option value="8">8 Dependentes</option>
    <option value="9">9 Dependentes</option>
    <option value="10">10 Dependentes</option>
</select>
            <select id="pensao">
                <option value="nao">
                    Sem Pensão
                </option>
                <option value="sim">
                    Com Pensão
                </option>
            </select>
            <div id="campo-pensao">
                <input
                type="number"
                id="valorPensao"
                placeholder="Valor da pensão">
            </div>
            <button id="button">
                CALCULAR
            </button>
        </div>
        <!-- RESULTADO -->
        <div class="resultado">

            <h2>Resultado</h2>
            <p>
                Salário Bruto:
                <span id="salarioBrutoResultado">
                    R$ 0,00
                </span>
            </p>
            <p>
                INSS:
                <span id="valorInss">
                    R$ 0,00
                </span>
            </p>
            <p>
                Dependentes:
                <span id="valorDependentes">
                    R$ 0,00
                </span>
            </p>
            <p>
                Pensão:
                <span id="valorPensaoResultado">
                    R$ 0,00
                </span>
            </p>
            <p>
                Base IR:
                <span id="baseIr">
                    R$ 0,00
                </span>
            </p>
            <p>
                IR:
                <span id="valorIr">
                    R$ 0,00
                </span>
            </p>
            <h3>
                Líquido:
                <span id="salarioLiquido">
                    R$ 0,00
                </span>
            </h3>
        </div>
    </div>
</div>
<script src="ir.js"></script>
</body>
</html>
